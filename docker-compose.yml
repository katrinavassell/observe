services:
  tanso:
    build: .
    ports:
      - "3001:3001"
      - "5173:5173"
    environment:
      DATABASE_URL: postgresql://observe:observe@postgres:5432/observe
      SESSION_SECRET: ${SESSION_SECRET:-changeme-generate-a-real-secret}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: observe
      POSTGRES_PASSWORD: observe
      POSTGRES_DB: observe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observe"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
